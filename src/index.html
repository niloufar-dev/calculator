<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="./output.css">
  <link rel="stylesheet" href="./input.css">
  <!-- npx @tailwindcss/cli -i ./src/input.css -o ./src/output.css --watch -->
</head>
<body class="bg-gradient-to-br from-[#4f5f91] via-[#6770b4] to-[#8873c7] ">
<div class="min-h-screen  relative flex items-center justify-center
">
  <!-- Glow Ring -->
  <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
  <div class="w-[780px] h-[780px] rounded-full border-[10px] border-white/60 blur-[10px]"></div>
</div>

  <!-- Calculator -->
  <div
  class="relative z-10
w-[340px]
rounded-[35px]
overflow-hidden

bg-white/15
backdrop-blur-2xl

border border-white/25

shadow-[0_0_20px_rgba(0,110,215,0.5)]">

    <!-- Header -->
    <div class="p-8 text-white ">

      <div class="flex justify-between mb-10">
        <span>☰ Standard</span>
        <span>↺</span>
      </div>

      <div class="text-right">
        <p id="history" class="text-white/60 text-xl"></p>
        <h1 id="result" class="text-6xl font-light">0</h1>
      </div>

    </div>

    <!-- Keys -->
    <div class="grid grid-cols-4">

      <button id="clear" class="key action bg-white">AC</button>
      <button class="key action bg-white operator">×</button>
      <button class="key action bg-white operator">÷</button>
      <button id="backspace" class="key action bg-white">⌫</button>

      <button class="key number">7</button>
      <button class="key number">8</button>
      <button class="key number">9</button>
      <button id="percent" class="key action bg-white operator">%</button>

      <button class="key number">4</button>
      <button class="key number">5</button>
      <button class="key number">6</button>
      <button class="key action bg-white operator">−</button>

      <button class="key number">1</button>
      <button class="key number">2</button>
      <button class="key number">3</button>
      <button class="key action bg-white operator">+</button>

      <button class="key number">0</button>
      <button  class="key number">00</button>
      <button class="key number">.</button>
      <button id="equal" class="key action bg-white">=</button>

    </div>

  </div>

</div>
<div class="ball left-10 top-40"></div>
<div class="ball right-10 top-60"></div>
<div class="ball left-0 bottom-40"></div>

<footer class="relative flex items-center justify-center w-full  p-10  overflow-hidden mt-24">
 
  <div class="absolute w-[520px] h-[520px] bg-purple-250 rounded-full filter blur-[150px] opacity-50  -top-14 -left-14"></div>
  <div class="absolute w-[520px] h-[520px] rounded-full filter blur-[150px] opacity-50  -bottom-14 -right-14"></div>

  
  <div class="relative w-full max-w-md p-8 rounded-3xl bg-white/10 backdrop-blur-xl border border-pink-200/25  text-center animate-cardFloat">
    
   
    <figure class="w-[220px] h-[220px] mx-auto rounded-3xl overflow-hidden border-4 border-pink-200/70 shadow-[0_0_45px_rgba(255,150,230,0.9)] animate-imgGlow  ">
      <img src="./img/IMG_7271.PNG" alt="profile" class="object-cover w-full h-full transition-transform duration-500 hover:scale-110 hover:rotate-3 " />
    </figure>

    
    <h1 class="mt-6 text-3xl text-pink-100 sm:text-4xl drop-shadow-lg">Niloufar Mohammadi</h1>
    <h3 class="mt-2 text-lg sm:text-xl text-pink-200/90">Front-End Developer</h3>

   
    <div class="flex justify-center gap-6 mt-7 sm:gap-7">
      <a href="https://github.com/niloufar-dev" target="_blank" class="w-14 h-14 rounded-full bg-pink-200/20 backdrop-blur-md flex items-center justify-center text-white text-xl shadow-[0_0_20px_rgba(255,170,230,0.4),inset_0_0_12px_rgba(255,255,255,0.25)] hover:scale-110 hover:-translate-y-2 hover:shadow-[0_0_35px_rgba(255,240,255,1),0_0_60px_rgba(255,100,200,0.9),inset_0_0_22px_rgba(255,255,255,0.5)] transition-all duration-300">
       <img src="img/github-fill.svg" alt="" class="w-9">
      </a>

      <a href="https://www.linkedin.com/in/niloufar-mohammadi-a0b2503ab/" target="_blank" class="w-14 h-14 rounded-full bg-pink-200/20 backdrop-blur-md flex items-center justify-center text-pink-100 text-xl shadow-[0_0_20px_rgba(255,170,230,0.4),inset_0_0_12px_rgba(255,255,255,0.25)] hover:scale-110 hover:-translate-y-2 hover:shadow-[0_0_35px_rgba(255,240,255,1),0_0_60px_rgba(255,100,200,0.9),inset_0_0_22px_rgba(255,255,255,0.5)] transition-all duration-300">
       <img src="img/linkedin-box-fill.svg" alt="" class="rounded-full w-9">
      </a>

      <a href="https://www.instagram.com/niloufar_dev" target="_blank" class="w-14 h-14 rounded-full bg-pink-200/20 backdrop-blur-md flex items-center justify-center text-pink-300 text-xl shadow-[0_0_20px_rgba(255,170,230,0.4),inset_0_0_12px_rgba(255,255,255,0.25)] hover:scale-110 hover:-translate-y-2 hover:shadow-[0_0_35px_rgba(255,240,255,1),0_0_60px_rgba(255,100,200,0.9),inset_0_0_22px_rgba(255,255,255,0.5)] transition-all duration-300">
       <img src="img/instagram-fill.svg" alt="" class="w-10 rounded-full">
      </a>
    </div>

  </div>
</footer>
<script src="./script.js"></script>
</body>
</html>
